# Serves the built SPA and reverse-proxies the API to the `api` service (FastAPI
# on :8086) over the compose network. Same-origin => no CORS, single clean URL.

upstream backend {
    server api:8086;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Common proxy headers (inherited by the API locations below).
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ---- API reverse proxy ----
    location /auth/     { proxy_pass http://backend; }
    location /me/       { proxy_pass http://backend; }
    location = /health  { proxy_pass http://backend; }

    # Docs are handy in the demo.
    location = /openapi.json { proxy_pass http://backend; }
    location /docs      { proxy_pass http://backend; }

    # Chats — includes the SSE streaming endpoint, so disable buffering and allow
    # long-lived responses. (No proxy_set_header here, so the server-level headers
    # above are still inherited.)
    location /chats {
        proxy_pass http://backend;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Chart images generated by make_graph, served by the API's StaticFiles mount.
    location /charts/ {
        proxy_pass http://backend;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ---- Static assets: long cache (hashed filenames) ----
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- SPA: everything else falls back to index.html (client-side routing) ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
